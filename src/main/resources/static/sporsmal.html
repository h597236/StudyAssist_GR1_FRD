<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Still spørsmål – StudyAssist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sp-layout">

    <!-- Sidebar -->
    <aside class="sp-sidebar">
        <div class="sp-sidebar-top">
            <!-- Logo -->
            <a href="index.html" class="navbar-brand" style="color: var(--text-primary);">
                <img src="logo1.png" alt="Logo" class="navbar-logo_sporsmal">
            </a>

            <!-- Kom i gang -->
            <div class="sp-sidebar-section">
                <div class="sp-sidebar-label">Kom i gang</div>
                <a href="sporsmal.html?subject=Generelt&topic=Fritt%20spørsmål" class="sp-sidebar-link">
                    Midlertidig chat
                </a>
                <a href="#" class="sp-sidebar-link" onclick="openNyChatModal(); return false;">
                    Ny chat
                </a>
                <a href="#" class="sp-sidebar-link">
                    <span class="sp-sidebar-icon">🔍</span> Søk i chat
                </a>
            </div>

            <!-- Mine emner -->
            <div class="sp-sidebar-section">
                <div class="sp-sidebar-label">Mine emner</div>
                <a href="#" class="sp-sidebar-link" onclick="openNyttEmneModal(); return false;">
                    <span class="sp-sidebar-icon">＋</span> Nytt emne
                </a>
                <div id="sidebarEmneList"></div>
            </div>
        </div>

        <!-- User footer -->
        <div class="sp-sidebar-footer">
            <div class="sp-sidebar-avatar"></div>
            <span id="sidebarBrukarnavn">bruker@email.com</span>
            <button class="sp-sidebar-logout" onclick="loggUt()" title="Logg ut">→</button>
        </div>
    </aside>

    <!-- Main area -->
    <main class="sp-main">

        <!-- Chat messages area (scrollable) -->
        <div class="chat-messages" id="chatMessages">
            <div class="chat-welcome">
                <p class="sp-hint">Velg emne og tema og still spørsmålet ditt for å komme i gang</p>
            </div>
        </div>

        <!-- Input bar pinned to bottom -->
        <div class="chat-input-bar">
            <div class="chat-input-inner">
                <div class="sp-selects">
                    <select id="emneSelect" onchange="updateTemaSelect()">
                        <option value="">Emne</option>
                    </select>
                    <select id="temaSelect">
                        <option value="">Tema</option>
                    </select>
                </div>
                <div class="chat-input-row">
                    <textarea id="question" class="chat-textarea" placeholder="Skriv spørsmålet ditt her.." rows="1"></textarea>
                    <button class="btn btn-primary chat-send-btn" onclick="sendQuestion()">Send</button>
                </div>
            </div>
        </div>

    </main>

</div>

<!-- Modal: Nytt emne -->
<div class="modal-overlay" id="nyttEmneModal">
    <div class="modal">
        <h3>Opprett nytt emne</h3>
        <label for="modalEmneName2">Emnenamn</label>
        <input type="text" id="modalEmneName2" placeholder="DAT109">
        <label for="modalEmneDesc2">Skildring</label>
        <input type="text" id="modalEmneDesc2" placeholder="Prosjekt- og applikasjonsutvikling">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeNyttEmneModal()">Avbryt</button>
            <button class="btn btn-primary" onclick="addEmne()">Legg til</button>
        </div>
    </div>
</div>

<!-- Modal: Nytt tema -->
<div class="modal-overlay" id="nyttTemaModal">
    <div class="modal">
        <h3 id="nyttTemaTitle">Legg til tema</h3>
        <label for="modalTemaName">Temanamn</label>
        <input type="text" id="modalTemaName" placeholder="Skriv temanamn">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeNyttTemaModal()">Avbryt</button>
            <button class="btn btn-primary" onclick="addTema()">Legg til</button>
        </div>
    </div>
</div>

<script>
    // ── Data ──
    var subjects = JSON.parse(localStorage.getItem("subjects")) || [];
    var brukarnavn = localStorage.getItem("brukarnavn") || "bruker@email.com";
    var activeEmneIndex = null;

    document.getElementById("sidebarBrukarnavn").textContent = brukarnavn;

    function saveSubjects() {
        localStorage.setItem("subjects", JSON.stringify(subjects));
    }

    // ── Sidebar emne list ──
    function renderSidebar() {
        var list = document.getElementById("sidebarEmneList");
        list.innerHTML = "";

        subjects.forEach(function(subject, index) {
            var item = document.createElement("div");
            item.className = "sp-emne-item";

            var header = document.createElement("div");
            header.className = "sp-emne-header";
            header.onclick = function() { toggleEmne(index); };

            var dot = document.createElement("span");
            dot.className = "sp-emne-dot";

            var name = document.createElement("span");
            name.className = "sp-emne-name";
            name.textContent = subject.name;

            var arrow = document.createElement("span");
            arrow.className = "sp-emne-arrow";
            arrow.id = "arrow-" + index;
            arrow.textContent = "∨";

            header.appendChild(dot);
            header.appendChild(name);
            header.appendChild(arrow);
            item.appendChild(header);

            // Topics (collapsed by default)
            var topics = document.createElement("div");
            topics.className = "sp-emne-topics";
            topics.id = "topics-" + index;

            if (subject.topics && subject.topics.length > 0) {
                subject.topics.forEach(function(topic) {
                    var link = document.createElement("a");
                    link.href = "#";
                    link.className = "sp-topic-link";
                    link.textContent = topic;
                    link.onclick = function(e) {
                        e.preventDefault();
                        selectEmneAndTema(index, topic);
                    };
                    topics.appendChild(link);
                });
            }

            var addBtn = document.createElement("a");
            addBtn.href = "#";
            addBtn.className = "sp-topic-link sp-topic-add";
            addBtn.innerHTML = "<span class='sp-sidebar-icon'>＋</span> Nytt tema";
            addBtn.onclick = function(e) {
                e.preventDefault();
                openNyttTemaModal(index);
            };
            topics.appendChild(addBtn);

            item.appendChild(topics);
            list.appendChild(item);
        });
    }

    function toggleEmne(index) {
        var topics = document.getElementById("topics-" + index);
        var arrow = document.getElementById("arrow-" + index);

        if (topics.classList.contains("open")) {
            topics.classList.remove("open");
            arrow.textContent = "∨";
        } else {
            topics.classList.add("open");
            arrow.textContent = "∧";
        }
    }

    function selectEmneAndTema(emneIndex, tema) {
        var emneSelect = document.getElementById("emneSelect");
        var temaSelect = document.getElementById("temaSelect");

        emneSelect.value = emneIndex;
        updateTemaSelect();

        // Set the tema value
        for (var i = 0; i < temaSelect.options.length; i++) {
            if (temaSelect.options[i].value === tema) {
                temaSelect.value = tema;
                break;
            }
        }
    }

    // ── Dropdowns ──
    function renderDropdowns() {
        var emneSelect = document.getElementById("emneSelect");
        emneSelect.innerHTML = '<option value="">Emne</option>';

        subjects.forEach(function(subject, index) {
            var opt = document.createElement("option");
            opt.value = index;
            opt.textContent = subject.name;
            emneSelect.appendChild(opt);
        });

        // Check URL params
        var params = new URLSearchParams(window.location.search);
        var urlSubject = params.get("subject");
        var urlTopic = params.get("topic");

        if (urlSubject) {
            for (var i = 0; i < subjects.length; i++) {
                if (subjects[i].name === urlSubject) {
                    emneSelect.value = i;
                    updateTemaSelect();
                    if (urlTopic) {
                        document.getElementById("temaSelect").value = urlTopic;
                    }
                    break;
                }
            }
        }
    }

    function updateTemaSelect() {
        var emneSelect = document.getElementById("emneSelect");
        var temaSelect = document.getElementById("temaSelect");
        var idx = emneSelect.value;

        temaSelect.innerHTML = '<option value="">Tema</option>';

        if (idx !== "" && subjects[idx] && subjects[idx].topics) {
            subjects[idx].topics.forEach(function(topic) {
                var opt = document.createElement("option");
                opt.value = topic;
                opt.textContent = topic;
                temaSelect.appendChild(opt);
            });
        }
    }

    // ── Send Question ──
    async function sendQuestion() {
        var emneIdx = document.getElementById("emneSelect").value;
        var tema = document.getElementById("temaSelect").value;
        var question = document.getElementById("question").value.trim();

        if (!question) return;

        var subject = emneIdx !== "" ? subjects[emneIdx].name : "Generelt";
        var topic = tema || "Fritt spørsmål";

        // Add user message bubble
        addMessage("user", question);
        document.getElementById("question").value = "";
        autoResizeTextarea();

        // Add loading bubble
        var loadingId = addMessage("ai", "Tenkjer...");

        try {
            var response = await fetch("/api/ai/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    subject: subject,
                    topic: topic,
                    question: question
                })
            });

            var data = await response.json();

            var aiText = "";
            if (data.explanation) {
                aiText += data.explanation;
            }
            if (data.follow_up_question) {
                aiText += "\n\n💡 " + data.follow_up_question;
            }

            // Replace loading with actual response
            updateMessage(loadingId, aiText || "Ingen forklaring mottatt.");

            var count = parseInt(localStorage.getItem("sporsmalCount")) || 0;
            localStorage.setItem("sporsmalCount", count + 1);

        } catch (error) {
            updateMessage(loadingId, "Feil ved kall til backend. Sjekk at serveren køyrer.");
            console.error(error);
        }
    }

    var messageCounter = 0;

    function addMessage(type, text) {
        var messages = document.getElementById("chatMessages");
        var welcome = messages.querySelector(".chat-welcome");
        if (welcome) welcome.style.display = "none";

        var id = "msg-" + (++messageCounter);
        var bubble = document.createElement("div");
        bubble.className = "chat-bubble chat-" + type;
        bubble.id = id;
        bubble.innerHTML = '<div class="chat-bubble-content">' + escapeHtml(text) + '</div>';
        messages.appendChild(bubble);
        messages.scrollTop = messages.scrollHeight;
        return id;
    }

    function updateMessage(id, text) {
        var el = document.getElementById(id);
        if (el) {
            el.querySelector(".chat-bubble-content").innerHTML = escapeHtml(text).replace(/\n/g, "<br>");
        }
        var messages = document.getElementById("chatMessages");
        messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(str) {
        var div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }

    // Auto-resize textarea
    var textarea = document.getElementById("question");
    textarea.addEventListener("input", autoResizeTextarea);
    textarea.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendQuestion();
        }
    });

    function autoResizeTextarea() {
        textarea.style.height = "auto";
        textarea.style.height = Math.min(textarea.scrollHeight, 150) + "px";
    }

    // ── Modals ──
    function openNyttEmneModal() {
        document.getElementById("nyttEmneModal").classList.add("active");
    }
    function closeNyttEmneModal() {
        document.getElementById("nyttEmneModal").classList.remove("active");
    }

    function openNyttTemaModal(index) {
        activeEmneIndex = index;
        document.getElementById("nyttTemaTitle").textContent = subjects[index].name + " – Nytt tema";
        document.getElementById("nyttTemaModal").classList.add("active");
    }
    function closeNyttTemaModal() {
        document.getElementById("nyttTemaModal").classList.remove("active");
        document.getElementById("modalTemaName").value = "";
    }

    function openNyChatModal() {
        // Reset dropdowns and go blank
        document.getElementById("emneSelect").value = "";
        updateTemaSelect();
        document.getElementById("question").value = "";
        document.getElementById("responseArea").style.display = "none";
    }

    function addEmne() {
        var name = document.getElementById("modalEmneName2").value.trim();
        var desc = document.getElementById("modalEmneDesc2").value.trim();
        if (!name) return;

        subjects.push({ name: name, description: desc, topics: [] });
        saveSubjects();
        renderSidebar();
        renderDropdowns();
        closeNyttEmneModal();
        document.getElementById("modalEmneName2").value = "";
        document.getElementById("modalEmneDesc2").value = "";
    }

    function addTema() {
        var name = document.getElementById("modalTemaName").value.trim();
        if (!name || activeEmneIndex === null) return;

        subjects[activeEmneIndex].topics.push(name);
        saveSubjects();
        renderSidebar();
        renderDropdowns();
        closeNyttTemaModal();

        // Open the emne in sidebar
        var topics = document.getElementById("topics-" + activeEmneIndex);
        if (topics) topics.classList.add("open");
        var arrow = document.getElementById("arrow-" + activeEmneIndex);
        if (arrow) arrow.textContent = "∧";
    }

    function loggUt() {
        localStorage.removeItem("brukarnavn");
        window.location.href = "/login.html";
    }

    // Close modals on overlay click
    document.querySelectorAll(".modal-overlay").forEach(function(overlay) {
        overlay.addEventListener("click", function(e) {
            if (e.target === overlay) overlay.classList.remove("active");
        });
    });

    // ── Init ──
    renderSidebar();
    renderDropdowns();
</script>

</body>
</html>
