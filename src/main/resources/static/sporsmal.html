<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Still spørsmål – StudyAssist</title>
    <link rel="icon" type="image/x-icon" href="/img/maskott.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sp-layout">
    <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sp-sidebar">

        <div class="sp-sidebar-fixed">
            <a href="/home" class="navbar-brand" style="color: var(--text-primary);">
                <img src="img/logo1.png" alt="Logo" class="navbar-logo_sporsmal">
            </a>

            <div class="sp-sidebar-section">
                <div class="sp-sidebar-label">Kom i gang</div>
                <a href="/sporsmal?temp=true" class="sp-sidebar-link">
                    Midlertidig chat
                </a>
                <a href="#" class="sp-sidebar-link" onclick="openNyChatModal(); return false;">
                    Ny chat
                </a>
                <a href="/historikk" class="sp-sidebar-link">
                    <span class="sp-sidebar-icon">🔍</span> Søk i chat
                </a>
            </div>
        </div>

        <div class="sp-sidebar-scroll">
            <div class="sp-sidebar-section">
                <div class="sp-sidebar-label">Mine emner</div>
                <a href="#" class="sp-sidebar-link" onclick="openNyttEmneModal(); return false;">
                    <span class="sp-sidebar-icon">＋</span> Nytt emne
                </a>
                <div id="sidebarEmneList"></div>
            </div>
        </div>

        <div class="sp-sidebar-footer">
            <div class="sp-sidebar-avatar"></div>
            <span id="sidebarBrukarnavn">bruker@email.com</span>
            <button class="sp-sidebar-logout" onclick="loggUt()" title="Logg ut">→</button>
        </div>

    </aside>

    <!-- Main area -->
    <main class="sp-main">

        <div class="chat-messages" id="chatMessages">
            <div class="chat-welcome">
                <p class="sp-hint" id="selectedContext">
                    Velg emne og tema og still spørsmålet ditt for å komme i gang
                </p>
            </div>

            <!-- 🔥 Step 2: Follow-up -->
            <div id="followUpContainer" style="display:none; margin-top:20px;">
        <textarea id="followUpAnswer" class="chat-textarea"
                  placeholder="Skriv refleksjonen din..."></textarea>
                <button class="btn btn-primary" onclick="sendFollowUp()">
                    Send svar
                </button>
            </div>

            <!-- 🔥 Step 3: Feedback -->
            <div id="feedbackContainer" style="display:none; margin-top:20px;">
        <textarea id="feedbackInput" class="chat-textarea"
                  placeholder="Gi tilbakemelding (valgfritt)..."></textarea>
                <button class="btn btn-secondary" onclick="sendFeedback()">
                    Fullfør
                </button>
            </div>
        </div>

        <div class="chat-input-bar">
            <div class="chat-input-inner">
                <div class="sp-selects">
                    <select id="emneSelect" onchange="updateTemaSelect();">
                        <option value="">Emne</option>
                    </select>
                    <select id="temaSelect" onchange="updateSelectedContext(); updateUrlFromDropdowns()">
                        <option value="">Tema</option>
                    </select>
                </div>
                <div class="chat-input-row">
                    <textarea id="question" class="chat-textarea" placeholder="Skriv spørsmålet ditt her.." rows="1"></textarea>
                    <button id="sendBtn" class="btn btn-primary chat-send-btn" onclick="sendQuestion()">
                        Send
                    </button>
                </div>
            </div>
        </div>

    </main>

</div>

<!-- Modal: Nytt emne -->
<div class="modal-overlay" id="nyttEmneModal">
    <div class="modal">
        <h3>Opprett nytt emne</h3>
        <label for="modalEmneName2">Emnenamn</label>
        <input type="text" id="modalEmneName2" placeholder="DAT109">
        <label for="modalEmneDesc2">Skildring</label>
        <input type="text" id="modalEmneDesc2" placeholder="Prosjekt- og applikasjonsutvikling">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeNyttEmneModal()">Avbryt</button>
            <button class="btn btn-primary" onclick="addEmne()">Legg til</button>
        </div>
    </div>
</div>

<!-- Modal: Nytt tema -->
<div class="modal-overlay" id="nyttTemaModal">
    <div class="modal">
        <h3 id="nyttTemaTitle">Legg til tema</h3>
        <label for="modalTemaName">Temanamn</label>
        <input type="text" id="modalTemaName" placeholder="Skriv temanamn">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeNyttTemaModal()">Avbryt</button>
            <button class="btn btn-primary" onclick="addTema()">Legg til</button>
        </div>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/sporsmal.js"></script>

</body>
</html>
