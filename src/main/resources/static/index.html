<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyAssist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="index.html" class="navbar-brand">
        <img src="logo1.png" alt="Logo" class="navbar-logo">
    </a>
    <ul class="navbar-links">
        <li><a href="sporsmal.html">Still spørsmål</a></li>
        <li><a href="historikk.html">Historikk</a></li>
    </ul>
    <div class="navbar-user">
        <span id="navBrukarnavn">bruker@email.com</span>
        <button class="btn-logout" onclick="loggUt()">Logg ut</button>
    </div>
</nav>

<!-- Main Content -->
<div class="main-content">

    <!-- Welcome -->
    <div class="welcome">
        <img src="maskott.png" alt="StudyAssist maskot" class="welcome-avatar">
        <h1>Er du klar for ei læringsøkt med meg?</h1>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon emne">📚</div>
            <div>
                <span class="stat-number" id="statEmne">0</span>
                <div class="stat-label">Emne</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon tema">📝</div>
            <div>
                <span class="stat-number" id="statTema">0</span>
                <div class="stat-label">Tema</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon sporsmal">💬</div>
            <div>
                <span class="stat-number" id="statSporsmal">0</span>
                <div class="stat-label">Spørsmål stilt</div>
            </div>
        </div>
    </div>

    <!-- Mine emne section -->
    <div class="section-panel">
        <div class="section-header">
            <h2>Mine emne</h2>
            <div class="section-actions">
                <button class="btn btn-secondary" onclick="goToTempChat()">Midlertidig chat</button>
                <button class="btn btn-primary" onclick="openNewEmneModal()">Nytt emne</button>
            </div>
        </div>

        <div class="emne-grid" id="emneGrid"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <p>Du har ikkje lagt til nokre emne enno. Klikk «Nytt emne» for å komme i gang!</p>
        </div>
    </div>

</div>

<!-- Modal: Nytt emne -->
<div class="modal-overlay" id="newEmneModal">
    <div class="modal">
        <h3>Opprett nytt emne</h3>
        <label for="modalEmneName">Emnenamn (t.d. DAT109)</label>
        <input type="text" id="modalEmneName" placeholder="DAT109">
        <label for="modalEmneDesc">Skildring</label>
        <input type="text" id="modalEmneDesc" placeholder="Prosjekt- og applikasjonsutvikling">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeNewEmneModal()">Avbryt</button>
            <button class="btn btn-primary" onclick="addSubject()">Legg til</button>
        </div>
    </div>
</div>

<!-- Modal: Vel tema for emne -->
<div class="modal-overlay" id="temaModal">
    <div class="modal">
        <h3 id="temaModalTitle">Vel tema</h3>
        <label for="temaSelect">Tema:</label>
        <select id="temaSelect"></select>
        <label for="newTemaInput">Eller legg til nytt tema:</label>
        <input type="text" id="newTemaInput" placeholder="Skriv temanamn">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeTemaModal()">Avbryt</button>
            <button class="btn btn-secondary" onclick="addTemaFromModal()">Legg til tema</button>
            <button class="btn btn-primary" onclick="goToQuestionPage()">Gå vidare</button>
        </div>
    </div>
</div>

<script>
    // ── Data ──
    let sporsmalCount = parseInt(localStorage.getItem("sporsmalCount")) || 0;
    let selectedSubjectIndex = null;

    // ── Display username ──
    const brukarnavn = localStorage.getItem("brukarnavn") || "bruker";
    document.getElementById("navBrukarnavn").textContent = brukarnavn;

    // ── Stats ──
    async function loadStats() {
        try {
            const brukarId = localStorage.getItem("brukarId");

            const res = await fetch(`/emne/brukar/${brukarId}`);
            const emner = await res.json();

            document.getElementById("statEmne").textContent = emner.length;

            let totalTema = 0;

            for (const emne of emner) {
                const temaRes = await fetch(`/tema/emne/${emne.emneId}`);
                const temaListe = await temaRes.json();
                totalTema += temaListe.length;
            }

            document.getElementById("statTema").textContent = totalTema;

            // keep this as is
            document.getElementById("statSporsmal").textContent = sporsmalCount;

        } catch (error) {
            console.error("Stats error:", error);
        }
    }

    // ── Add Subject ──
    async function addSubject() {
        const emneNavn = document.getElementById("modalEmneName").value;
        const emneDesc = document.getElementById("modalEmneDesc").value;

        if (!emneNavn) {
            alert("Skriv inn emnenamn");
            return;
        }

        try {
            const response = await fetch("/emne", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    namn: emneNavn,
                    beskrivelse: emneDesc,
                    brukar: {
                        id: parseInt(localStorage.getItem("brukarId"))
                    }
                })
            });

            const emne = await response.json();

            // 👇 store selected emne globally for later use
            window.selectedEmneId = emne.emneId;

            closeNewEmneModal();
            await loadEmner();
            await loadStats();
            // open tema modal after creating emne
            openTemaModal(emne.emneID);

        } catch (error) {
            console.error(error);
            alert("Feil ved oppretting av emne");
        }
    }

    // ── Delete Subject ──
    function deleteSubject(index) {
        var name = subjects[index].name;
        if (confirm('Er du sikker på at du vil slette "' + name + '"?')) {
            subjects.splice(index, 1);
            saveSubjects();
            renderEmneCards();
        }
    }

    // ── Modals ──
    function openNewEmneModal() {
        document.getElementById("newEmneModal").classList.add("active");
    }

    function closeNewEmneModal() {
        document.getElementById("newEmneModal").classList.remove("active");
    }

    async function openTemaModal(emneId) {
        window.selectedEmneId = emneId;

        document.getElementById("temaModalTitle").textContent = "Vel tema";

        const select = document.getElementById("temaSelect");
        select.innerHTML = "";

        try {
            const res = await fetch(`/tema/emne/${emneId}`);
            const temaListe = await res.json();

            if (temaListe.length > 0) {
                temaListe.forEach(tema => {
                    const opt = document.createElement("option");
                    opt.value = tema.namn;
                    opt.textContent = tema.namn;
                    select.appendChild(opt);
                });
            } else {
                const opt = document.createElement("option");
                opt.value = "";
                opt.textContent = "Ingen tema enno – legg til eit nedanfor";
                select.appendChild(opt);
            }

        } catch (error) {
            console.error(error);
            alert("Feil ved henting av tema");
        }

        document.getElementById("temaModal").classList.add("active");
    }

    function closeTemaModal() {
        document.getElementById("temaModal").classList.remove("active");
        document.getElementById("newTemaInput").value = "";
    }

    async function addTemaFromModal() {
        const temaNavn = document.getElementById("newTemaInput").value;

        if (!temaNavn) {
            alert("Skriv inn tema");
            return;
        }

        if (!window.selectedEmneId) {
            alert("Ingen emne valgt");
            return;
        }

        try {
            const response = await fetch("/tema", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    namn: temaNavn,
                    emne: {
                        emneId: window.selectedEmneId
                    }
                })
            });

            const tema = await response.json();

            console.log("Tema lagret:", tema);

            await openTemaModal(window.selectedEmneId);

            // optional: clear input
            document.getElementById("newTemaInput").value = "";

        } catch (error) {
            console.error(error);
            alert("Feil ved lagring av tema");
        }
    }

    async function loadEmner() {
        const brukarID = localStorage.getItem("brukarId");

        const res = await fetch(`/emne/brukar/${brukarID}`);

        if (!res.ok) {
            const text = await res.text();
            console.error("Backend error:", text);
            throw new Error("Failed to load emner");
        }

        const data = await res.json();
        const emner = Array.isArray(data) ? data : [data];

        const grid = document.getElementById("emneGrid");
        const empty = document.getElementById("emptyState");

        grid.innerHTML = "";

        if (emner.length === 0) {
            empty.style.display = "block";
            return;
        }

        empty.style.display = "none";

        emner.forEach(emne => {
            const card = document.createElement("div");
            card.className = "emne-card";

            card.innerHTML =
                '<div class="emne-card-top">' +
                '<div class="emne-icon"></div>' +
                '</div>' +
                '<div class="emne-card-body">' +
                '<h3>' + emne.namn + '</h3>' +
                '<p>' + (emne.beskrivelse || 'Ingen skildring.') + '</p>' +
                '</div>';

            // 👇 IMPORTANT: store selected emneId
            card.onclick = function() {
                window.selectedEmneId = emne.emneId;
                openTemaModal(emne.emneId);
            };

            grid.appendChild(card);
        });
    }

    function goToQuestionPage() {
        const tema = document.getElementById("temaSelect").value;

        if (!window.selectedEmneId) {
            alert("Ingen emne valgt");
            return;
        }

        if (!tema) {
            alert("Vel eit tema");
            return;
        }

        window.location.href =
            "/sporsmal.html?emneId=" + encodeURIComponent(window.selectedEmneId) +
            "&tema=" + encodeURIComponent(tema);
    }

    function goToTempChat() {
        window.location.href = "/sporsmal.html?subject=Generelt&topic=Fritt%20spørsmål";
    }

    function loggUt() {
        localStorage.removeItem("brukarnavn");
        window.location.href = "/login.html";
    }

    // Close modals on overlay click
    document.querySelectorAll(".modal-overlay").forEach(function(overlay) {
        overlay.addEventListener("click", function(e) {
            if (e.target === overlay) {
                overlay.classList.remove("active");
            }
        });
    });

    // ── Init ──
    window.onload = async function() {
        await loadEmner();
        await loadStats();
    };

    window.addEventListener("pageshow", async function(event) {
        await loadEmner();
        await loadStats();
    });
</script>

</body>
</html>
