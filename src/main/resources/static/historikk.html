<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historikk – StudyAssist</title>
    <link rel="icon" type="image/x-icon" href="/img/maskott.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sp-layout">
    <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sp-sidebar">

        <!-- FIXED: Logo + Kom i gang -->
        <div class="sp-sidebar-fixed">
            <a href="/home" class="navbar-brand" style="color: var(--text-primary);">
                <img src="img/logo1.png" alt="Logo" class="navbar-logo_sporsmal">
            </a>

            <div class="sp-sidebar-section">
                <div class="sp-sidebar-label">Kom i gang</div>
                <a href="/sporsmal?temp=true" class="sp-sidebar-link">
                    Midlertidig chat
                </a>
                <a href="/sporsmal" class="sp-sidebar-link">
                    Ny chat
                </a>
                <a href="/historikk" class="sp-sidebar-link" style="background: var(--bg);">
                    <span class="sp-sidebar-icon">🔍</span> Søk i chat
                </a>
            </div>
        </div>

        <!-- SCROLLABLE: Mine emner -->
        <div class="sp-sidebar-scroll">
            <div class="sp-sidebar-section">
                <div class="sp-sidebar-label">Mine emner</div>
                <a href="#" class="sp-sidebar-link" onclick="openNyttEmneModal(); return false;">
                    <span class="sp-sidebar-icon">＋</span> Nytt emne
                </a>
                <div id="sidebarEmneList"></div>
            </div>
        </div>

        <!-- FIXED: User footer -->
        <div class="sp-sidebar-footer">
            <div class="sp-sidebar-avatar"></div>
            <span id="sidebarBrukarnavn">bruker@email.com</span>
            <button class="sp-sidebar-logout" onclick="loggUt()" title="Logg ut">→</button>
        </div>

    </aside>

    <!-- Main area -->
    <main class="sp-main" style="flex-direction: column; height: 100vh;">

        <div class="hist-content">
            <div class="hist-header">
                <h1>Søk i chat</h1>
            </div>

            <!-- Search bar -->
            <div class="hist-search-bar">
                <span class="hist-search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Søk i spørsmål, tema, emner.." oninput="filterHistory()">
            </div>

            <!-- Filter chips -->
            <div class="hist-filters" id="filterChips">
                <button class="hist-chip active" onclick="setFilter('alle', this)">Alle</button>
            </div>

            <!-- Results list -->
            <div class="hist-results" id="histResults"></div>

            <!-- Empty state -->
            <div class="hist-empty" id="histEmpty" style="display: none;">
                <p>Ingen resultat funne.</p>
            </div>
        </div>

    </main>

</div>


<!-- Modal: Nytt emne -->
<div class="modal-overlay" id="nyttEmneModal">
    <div class="modal">
        <h3>Opprett nytt emne</h3>
        <label for="modalEmneName2">Emnenamn</label>
        <input type="text" id="modalEmneName2" placeholder="DAT109">
        <label for="modalEmneDesc2">Skildring</label>
        <input type="text" id="modalEmneDesc2" placeholder="Prosjekt- og applikasjonsutvikling">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeNyttEmneModal()">Avbryt</button>
            <button class="btn btn-primary" onclick="addEmne()">Legg til</button>
        </div>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/historikk.js"></script>
<script>
    (function() {
        const base = getBase();
        document.querySelectorAll("a[href]").forEach(function(a) {
            const href = a.getAttribute("href");
            if (href.startsWith("/") && !href.startsWith("//")) {
                a.setAttribute("href", base + href);
            }
        });
    })();
</script>

</body>
</html>
