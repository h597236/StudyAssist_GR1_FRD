<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logg inn – StudyAssist</title>
    <link rel="icon" type="image/x-icon" href="/img/maskott.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
    <img src="img/logo_login.png" alt="Logo" class="navbar-logo">

    <!-- Logg inn-visning -->
    <div id="loginView">
        <p class="subtitle">Logg inn for å starte læringsøkta</p>

        <form id="loginForm">
            <input type="email" id="brukarnavn" placeholder="E-post" required>
            <div class="password-wrapper">
                <input type="password" id="passord" placeholder="Passord" required minlength="4">
                <button type="button" class="password-toggle" onclick="togglePassword('passord', this)">VIS</button>
            </div>
            <button type="submit" class="btn btn-primary">Logg inn</button>
        </form>

        <p class="login-switch">Har du ikkje brukar? <a href="#" onclick="showRegister(); return false;">Registrer deg</a></p>
    </div>

    <!-- Registrer-visning -->
    <div id="registerView" style="display: none;">
        <p class="subtitle">Opprett ein ny brukar</p>

        <input type="email" id="regEmail" placeholder="E-post" required>
        <div class="password-wrapper">
            <input type="password" id="regPassord" placeholder="Passord (minst 4 teikn)" required minlength="4">
            <button type="button" class="password-toggle" onclick="togglePassword('regPassord', this)">VIS</button>
        </div>
        <div class="password-wrapper">
            <input type="password" id="regPassordRepeat" placeholder="Gjenta passord" required minlength="4">
            <button type="button" class="password-toggle" onclick="togglePassword('regPassordRepeat', this)">VIS</button>
        </div>
        <button class="btn btn-primary" onclick="registrer()">Opprett brukar</button>

        <p class="login-switch">Har du allereie brukar? <a href="#" onclick="showLogin(); return false;">Logg inn</a></p>
    </div>

    <p id="melding"></p>
    </div>
</div>


<script src="js/common.js"></script>
<script src="js/login.js"></script>

</body>
</html>
