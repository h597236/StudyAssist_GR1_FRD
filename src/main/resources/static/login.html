<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logg inn – StudyAssist</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <img src="img/logo_login.png" alt="Logo" class="navbar-logo">

        <p class="subtitle">Logg inn for å starte læringsøkta</p>

        <form id="loginForm">
            <input type="text" id="brukarnavn" placeholder="Brukarnamn">
            <input type="password" id="passord" placeholder="Passord">

            <button type ="submit" class="btn btn-primary">Logg inn</button>
        </form>
        <button class="btn btn-secondary" onclick="registrer()">Registrer ny brukar</button>

        <p id="melding"></p>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/login.js"></script>

</body>
</html>
