<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systemprompt – StudyAssist Admin</title>
    <link rel="icon" type="image/x-icon" href="/img/maskott.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-layout { max-width: 1000px; margin: 0 auto; padding: 48px 32px; }
        .admin-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .prompt-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; margin-top: 32px; }
        .prompt-editor-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-sm); }
        .prompt-editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .prompt-editor-header span { font-size: 0.82rem; color: var(--text-muted); }
        .prompt-textarea { width: 100%; min-height: 280px; padding: 16px; font-size: 0.92rem; font-family: var(--font-body); border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text-primary); resize: vertical; outline: none; transition: border-color 0.2s; line-height: 1.6; }
        .prompt-textarea:focus { border-color: var(--accent); }
        .prompt-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 14px; margin-bottom: 18px; }
        .prompt-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .version-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); }
        .version-card h3 { font-family: var(--font-display); font-size: 1rem; font-weight: 600; margin-bottom: 18px; }
        .version-list { display: flex; flex-direction: column; gap: 10px; }
        .version-item { padding: 12px 14px; border: 1px solid var(--border-light); border-radius: var(--radius-sm); background: var(--bg); }
        .version-item.aktiv { border-color: var(--accent); background: #f0fafd; }
        .version-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .version-label { font-size: 0.82rem; font-weight: 600; }
        .version-aktiv-badge { font-size: 0.68rem; background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
        .version-date { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
        .version-btns { display: flex; gap: 6px; }
        .btn-xs { padding: 4px 12px; font-size: 0.78rem; border-radius: 6px; }
        .tab-row { display: flex; gap: 4px; margin-bottom: 0; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 10px 20px; font-size: 0.88rem; font-family: var(--font-body); font-weight: 500; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; color: var(--text-muted); transition: color 0.2s, border-color 0.2s; margin-bottom: -1px; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/home" class="navbar-brand">
        <img src="img/logo_login.png" alt="Logo" class="navbar-logo">
    </a>
    <ul class="navbar-links">
        <li><a href="/admin">Brukarar</a></li>
        <li><a href="/admin-prompt" class="active">Prompt</a></li>
    </ul>
    <div class="navbar-user">
        <span id="brukarnamn"></span>
        <button class="btn-logout" onclick="loggUt()">Logg ut</button>
    </div>
</nav>

<div class="admin-layout">
    <p class="admin-label">Admin panel</p>
    <h1 style="font-family: var(--font-display); font-size: 2rem; font-weight: 700; margin-bottom: 6px;">Systemprompt</h1>
    <p style="font-size: 0.88rem; color: var(--text-muted); margin-bottom: 28px;">Rediger promptane som blir sende til KI-modellen.</p>

    <div class="tab-row">
        <button class="tab-btn active" onclick="byttPrompt('oppfolgingssporsmal', this)">Oppfølgingsspørsmål</button>
        <button class="tab-btn" onclick="byttPrompt('vurdering', this)">Vurdering</button>
        <button class="tab-btn" onclick="byttPrompt('fasit', this)">Fasit</button>
    </div>

    <div class="prompt-grid">
        <div class="prompt-editor-card">
            <div class="prompt-editor-header">
                <span class="admin-label">Rediger prompt</span>
                <span id="teiknteller">0 tekn</span>
            </div>
            <textarea class="prompt-textarea" id="promptInnhald" oninput="oppdaterTeikntellar()" placeholder="Skriv prompten her..."></textarea>
            <p class="prompt-meta" id="promptMeta">Laster...</p>
            <div class="prompt-actions">
                <button class="btn btn-secondary" onclick="tilbakestill()">Tilbakestill</button>
                <button class="btn btn-primary" onclick="lagrePrompt()">Lagre og publiser</button>
            </div>
        </div>

        <div class="version-card">
            <h3>Versjonshistorikk</h3>
            <div class="version-list" id="versjonListe">
                <p style="font-size:0.85rem; color: var(--text-muted);">Laster...</p>
            </div>
        </div>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/AdminPrompt.js"></script>
</body>
</html>
