<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systemprompt – StudyAssist Admin</title>
    <link rel="icon" type="image/x-icon" href="/img/maskott.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <a href="/admin" class="navbar-brand">
        <img src="img/logo1.png" alt="Logo" class="navbar-logo">
    </a>
    <ul class="navbar-links">
        <li><a href="/admin">Brukarar</a></li>
        <li><a href="/admin-prompt" class="active">Prompt</a></li>
    </ul>
    <div class="navbar-user">
        <span id="brukarnamn"></span>
        <button class="btn-logout" onclick="loggUt()">Logg ut</button>
    </div>
</nav>

<div class="admin-layout">
    <p class="admin-label">Admin panel</p>
    <h1 class="admin-page-title">Systemprompt</h1>
    <p class="admin-page-subtitle">Rediger promptane som blir sende til KI-modellen.</p>

    <div class="tab-row">
        <button class="tab-btn active" onclick="byttPrompt('oppfolgingssporsmal', this)">Oppfølgingsspørsmål</button>
        <button class="tab-btn" onclick="byttPrompt('vurdering', this)">Vurdering</button>
        <button class="tab-btn" onclick="byttPrompt('fasit', this)">Fagelegvurdering</button>
    </div>

    <div class="prompt-grid">
        <div class="prompt-editor-card">
            <div class="prompt-editor-header">
                <span class="admin-label">Rediger prompt</span>
                <span id="teiknteller">0 tekn</span>
            </div>
            <textarea class="prompt-textarea" id="promptInnhald" oninput="oppdaterTeikntellar()" placeholder="Skriv prompten her..."></textarea>
            <p class="prompt-meta" id="promptMeta">Laster...</p>
            <div class="prompt-actions">
                <button class="btn btn-secondary" onclick="tilbakestill()">Tilbakestill</button>
                <button class="btn btn-secondary" onclick="opnTestModal()">Test prompt</button>
                <button class="btn btn-primary" onclick="lagrePrompt()">Lagre og publiser</button>
            </div>
        </div>

        <div class="version-card">
            <h3>Versjonshistorikk</h3>
            <div class="version-list" id="versjonListe">
                <p class="prompt-meta">Laster...</p>
            </div>
        </div>
    </div>
</div>

<!-- Test modal -->
<div class="modal-overlay" id="testModal">
    <div class="modal test-modal">
        <button class="modal-close-btn" onclick="lukkTestModal()">✕</button>
        <h3>Test prompt</h3>
        <p class="prompt-meta">Fyll inn testverdiar for plasshalderar. Ingenting blir lagra.</p>

        <div id="testInputFelt"></div>

        <div class="test-section-label">Ferdig-erstatta prompt</div>
        <div class="test-result-box" id="testResultatTekst">—</div>

        <div class="modal-actions modal-actions-top">
            <button class="btn btn-secondary" onclick="lukkTestModal()">Lukk</button>
            <button class="btn btn-primary" id="testAiKnapp" onclick="sendTestTilAI()">Send til AI</button>
        </div>

        <div id="testAiSvar" style="display:none;">
            <div class="test-section-label">AI-svar <span class="ai-svar-note">(ikkje lagra)</span></div>
            <div class="test-ai-result" id="testAiResultat">Laster...</div>
        </div>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/AdminPrompt.js"></script>
<script>
    (function() {
        const base = getBase();
        document.querySelectorAll("a[href]").forEach(function(a) {
            const href = a.getAttribute("href");
            if (href.startsWith("/") && !href.startsWith("//")) {
                a.setAttribute("href", base + href);
            }
        });
    })();
</script>
</body>
</html>
